theme: jekyll-dash
plugins:
 - jekyll-feed
 - jekyll-seo-tag
 - jekyll-paginate
 - liquid-md5
 - jekyll/tagging

title: Daanbreurs Blog
author: daanbreur

# required by disqus to display comments
url: https://blog.daanbreur.systems

# jekyll-paginate
paginate: 5
paginate_path: "/blog/page:num/"

# jekyll-tagging (optional)
tag_permalink_style: pretty
tag_page_layout: tag_page
tag_page_dir: tag

dash:
  date_format: "%b %-d, %Y"

  disqus:
    shortname: daanbreurblog

  # generate social links in footer
  # supported colors: green, red, orange, blue, cyan, pink, teal, yellow, indigo, purple
  social_links:
    - url: https://twitter.com/portaalg
      icon: twitter
      color: cyan
    - url: https://github.com/daanbreur
      icon: github
      color: purple
    - url: https://twitch.tv/portaalgaming
      icon: twitch
      color: purple

  show_author: true
  animation_speed: 50

# Replaces the default avatar provider (gravatar)
avatar_source: github
github_username: daanbreur